services:
  postgres:
    image: postgres:16-alpine
    container_name: astro-base-postgres
    environment:
      POSTGRES_DB: astro_base
      POSTGRES_USER: astro
      POSTGRES_PASSWORD: astro
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astro -d astro_base"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
